interface:
  display_name: "Reverse Golang Symbol Recovery"
  short_description: "pclntab, buildinfo, GoReSym/redress, and IDA MCP rename workflows."
  default_prompt: "Use $reverse-golang-symbol-recovery: confirm Go with file/go version -m/binwalk; extract buildinfo; run GoReSym or redress where appropriate; reconcile strings(1) with disassembler strings; use IDA MCP to list main.* and runtime xrefs for renaming; hand off to malware behavior analysis when names stabilize."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "idaProMCP"
      description: "IDA Pro MCP server for reading functions, xrefs, strings, and pseudocode."
